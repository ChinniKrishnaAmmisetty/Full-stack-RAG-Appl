services:
  # ── Milvus Dependencies ──
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: rag-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=2147483648 # Reduced to 2GB for lower memory usage
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # Removed exposed port to host for security. Only accessible inside Docker network.
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Milvus Vector Database ──
  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: rag-milvus
    restart: unless-stopped
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # Exposed for local development (backend running outside Docker)
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 1024M # Limited to 1GB to prevent RAM exhaustion

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "your password"
    # Removed external port exposure to protect database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000" # Explicitly exposed for frontend API requests
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rag_db
      DB_USER: postgres
      DB_PASSWORD: "your password"
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      GEMINI_API_KEY: "your api key"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── React Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "5173:80" # Exposed on standard HTTP mapped to Vite/Nginx internal port 80
    depends_on:
      - backend
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  postgres_data:
  backend_uploads:


networks:
  rag-network:
    driver: bridge
